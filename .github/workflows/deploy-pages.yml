# Statyczny build → GitHub Pages (https://USER.github.io/NAZWA_REPO/).
# Formularz: opcjonalnie zmienna VITE_CONTACT_API (Actions → Variables) = pełny URL do POST /api/contact na innym hostingu.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Ustal ścieżkę Vite (base)
        id: base
        shell: bash
        run: |
          NAME="${{ github.event.repository.name }}"
          if [[ "$NAME" == *.github.io ]]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Zainstaluj i zbuduj
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.path }}
          VITE_CONTACT_API: ${{ vars.VITE_CONTACT_API }}
        run: npm ci && npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
